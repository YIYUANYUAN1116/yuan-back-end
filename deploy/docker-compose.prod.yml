services:
  yuan-backend-admin:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    container_name: yuan-backend-admin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_CONFIG_ADDITIONAL_LOCATION: ${SPRING_CONFIG_ADDITIONAL_LOCATION:-file:/app/config/}
      JAVA_OPTS: ${JAVA_OPTS:-}
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/yuan?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true}
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      SPRING_DATA_REDIS_HOST: ${SPRING_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD:?SPRING_REDIS_PASSWORD is required}
      OSS_STORAGE: ${OSS_STORAGE:-S3_COMPATIBLE}
      OSS_BUCKET: ${OSS_BUCKET:-yuan}
      OSS_PRESIGN_EXPIRE_SECONDS: ${OSS_PRESIGN_EXPIRE_SECONDS:-600}
      OSS_S3_ENDPOINT: ${OSS_S3_ENDPOINT:-minio:9000}
      OSS_S3_ACCESS_KEY: ${OSS_S3_ACCESS_KEY:?OSS_S3_ACCESS_KEY is required}
      OSS_S3_SECRET_KEY: ${OSS_S3_SECRET_KEY:?OSS_S3_SECRET_KEY is required}
      OSS_S3_REGION: ${OSS_S3_REGION:-us-east-1}
      OSS_S3_PATH_STYLE_ACCESS: ${OSS_S3_PATH_STYLE_ACCESS:-true}
      SPRING_AI_OPENAI_API_KEY: ${SPRING_AI_OPENAI_API_KEY:-}
      SPRING_AI_OPENAI_BASE_URL: ${SPRING_AI_OPENAI_BASE_URL:-}
    ports:
      - "${APP_PORT_BIND:-127.0.0.1:6011:6011}"
    volumes:
      - ${CONFIG_DIR:-./config}:/app/config
      - ${LOGS_DIR:-./logs}:/app/logs

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --lower_case_table_names=1
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yuan}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT_BIND:-3306:3306}"
    volumes:
      - ${DATA_ROOT:-./runtime}/mysql/data:/var/lib/mysql
      - ${DATA_ROOT:-./runtime}/mysql/conf:/etc/mysql/conf.d
      - ${DATA_ROOT:-./runtime}/mysql/logs:/var/log/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "${REDIS_PORT_BIND:-6379:6379}"
    volumes:
      - ${DATA_ROOT:-./runtime}/redis/data:/data
      - ${DATA_ROOT:-./runtime}/redis/logs:/logs

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MINIO_API_PORT_BIND:-9000:9000}"
      - "${MINIO_CONSOLE_PORT_BIND:-9001:9001}"
    volumes:
      - ${DATA_ROOT:-./runtime}/minio/data:/data
      - ${DATA_ROOT:-./runtime}/minio/conf:/root/.minio
      - ${DATA_ROOT:-./runtime}/minio/logs:/logs
